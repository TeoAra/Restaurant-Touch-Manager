openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: POS Restaurant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Menu categories
  - name: products
    description: Menu products/items
  - name: tables
    description: Restaurant tables
  - name: orders
    description: Orders management
  - name: orderItems
    description: Order items
  - name: payments
    description: Payments
  - name: dashboard
    description: Dashboard and reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Tables
  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List all tables
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableBody"
      responses:
        "201":
          description: Created table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/{id}:
    get:
      operationId: getTable
      tags: [tables]
      summary: Get table by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
        "404":
          description: Not found
    patch:
      operationId: updateTable
      tags: [tables]
      summary: Update table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTableBody"
      responses:
        "200":
          description: Updated table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete table
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: ["string", "null"]
            enum: ["open", "paid", "cancelled", null]
        - name: tableId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Cancel order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Order Items
  /orders/{orderId}/items:
    get:
      operationId: listOrderItems
      tags: [orderItems]
      summary: List items for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderItem"
    post:
      operationId: addOrderItem
      tags: [orderItems]
      summary: Add item to order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrderItemBody"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"

  /orders/{orderId}/items/{itemId}:
    patch:
      operationId: updateOrderItem
      tags: [orderItems]
      summary: Update order item quantity or notes
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"
    delete:
      operationId: deleteOrderItem
      tags: [orderItems]
      summary: Remove item from order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # Payments
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Register a payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # Dashboard / Reports
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Daily revenue summary and stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sales-by-day:
    get:
      operationId: getSalesByDay
      tags: [dashboard]
      summary: Sales totals grouped by day (last 30 days)
      responses:
        "200":
          description: Sales by day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesByDay"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Top selling products
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/tables-status:
    get:
      operationId: getTablesStatus
      tags: [dashboard]
      summary: Current status of all tables with active order info
      responses:
        "200":
          description: Tables with status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TableStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - color
        - sortOrder
        - createdAt

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        sortOrder:
          type: integer
      required:
        - name
        - color
        - sortOrder

    Product:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: string
        available:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - price
        - available
        - sortOrder
        - createdAt

    CreateProductBody:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: string
        available:
          type: boolean
        sortOrder:
          type: integer
      required:
        - name
        - price
        - available
        - sortOrder

    Table:
      type: object
      properties:
        id:
          type: integer
        number:
          type: integer
        name:
          type: string
        seats:
          type: integer
        status:
          type: string
          enum: ["free", "occupied", "reserved"]
        createdAt:
          type: string
      required:
        - id
        - number
        - name
        - seats
        - status
        - createdAt

    CreateTableBody:
      type: object
      properties:
        number:
          type: integer
        name:
          type: string
        seats:
          type: integer
        status:
          type: string
          enum: ["free", "occupied", "reserved"]
      required:
        - number
        - name
        - seats
        - status

    UpdateTableBody:
      type: object
      properties:
        number:
          type: integer
        name:
          type: string
        seats:
          type: integer
        status:
          type: string
          enum: ["free", "occupied", "reserved"]

    Order:
      type: object
      properties:
        id:
          type: integer
        tableId:
          type: ["integer", "null"]
        tableName:
          type: ["string", "null"]
        status:
          type: string
          enum: ["open", "paid", "cancelled"]
        notes:
          type: ["string", "null"]
        total:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - status
        - total
        - createdAt
        - updatedAt

    OrderWithItems:
      type: object
      properties:
        id:
          type: integer
        tableId:
          type: ["integer", "null"]
        tableName:
          type: ["string", "null"]
        status:
          type: string
          enum: ["open", "paid", "cancelled"]
        notes:
          type: ["string", "null"]
        total:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - status
        - total
        - createdAt
        - updatedAt
        - items

    CreateOrderBody:
      type: object
      properties:
        tableId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
      required: []

    UpdateOrderBody:
      type: object
      properties:
        status:
          type: string
          enum: ["open", "paid", "cancelled"]
        notes:
          type: ["string", "null"]
        tableId:
          type: ["integer", "null"]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productPrice:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: string
        subtotal:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - orderId
        - productId
        - productName
        - productPrice
        - quantity
        - unitPrice
        - subtotal
        - createdAt

    AddOrderItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        notes:
          type: ["string", "null"]
      required:
        - productId
        - quantity

    UpdateOrderItemBody:
      type: object
      properties:
        quantity:
          type: integer
        notes:
          type: ["string", "null"]

    Payment:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        method:
          type: string
          enum: ["cash", "card", "other"]
        amount:
          type: string
        change:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - orderId
        - method
        - amount
        - createdAt

    CreatePaymentBody:
      type: object
      properties:
        orderId:
          type: integer
        method:
          type: string
          enum: ["cash", "card", "other"]
        amount:
          type: string
        change:
          type: ["string", "null"]
      required:
        - orderId
        - method
        - amount

    DashboardSummary:
      type: object
      properties:
        todayRevenue:
          type: string
        todayOrders:
          type: integer
        openOrders:
          type: integer
        occupiedTables:
          type: integer
        totalTables:
          type: integer
        avgOrderValue:
          type: string
      required:
        - todayRevenue
        - todayOrders
        - openOrders
        - occupiedTables
        - totalTables
        - avgOrderValue

    SalesByDay:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: string
        orders:
          type: integer
      required:
        - date
        - revenue
        - orders

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalQuantity:
          type: integer
        totalRevenue:
          type: string
      required:
        - productId
        - productName
        - totalQuantity
        - totalRevenue

    TableStatus:
      type: object
      properties:
        id:
          type: integer
        number:
          type: integer
        name:
          type: string
        seats:
          type: integer
        status:
          type: string
          enum: ["free", "occupied", "reserved"]
        activeOrderId:
          type: ["integer", "null"]
        activeOrderTotal:
          type: ["string", "null"]
        activeOrderCreatedAt:
          type: ["string", "null"]
      required:
        - id
        - number
        - name
        - seats
        - status
